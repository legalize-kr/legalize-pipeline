name: Daily Cache Refresh

on:
  schedule:
    - cron: '0 14 * * *' # 23:00 KST (UTC+9)
  workflow_dispatch:
    inputs:
      ordinance_max_new_details:
        description: 'Maximum missing ordinance details to fetch (scheduled default: 50000)'
        required: false
        default: '50000'
        type: string

permissions:
  contents: read

concurrency:
  group: workspace-cache
  cancel-in-progress: false

env:
  WORKSPACE_ROOT: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT
  LEGALIZE_CACHE_DIR: ${{ secrets.LEGALIZE_CACHE_DIR }}
  LEGALIZE_KR_REPO: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT/legalize-kr
  PIPELINE_REPO: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT/legalize-pipeline
  LAW_API_DAILY_BUDGET: '300000'
  ORDINANCE_MAX_NEW_DETAILS: ${{ inputs.ordinance_max_new_details || '50000' }}

jobs:
  refresh:
    runs-on: self-hosted
    timeout-minutes: 600

    steps:
      - name: Checkout law repo
        uses: actions/checkout@v6
        with:
          repository: legalize-kr/legalize-kr
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          path: LEGALIZE-KR-WORKSPACE-ROOT/legalize-kr

      - name: Checkout pipeline
        uses: actions/checkout@v6
        with:
          path: LEGALIZE-KR-WORKSPACE-ROOT/legalize-pipeline

      - name: Setup Python venv
        run: |
          python3 -m venv "$WORKSPACE_ROOT/.venv"
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          pip install -r "$PIPELINE_REPO/requirements.txt"

      - name: Disk preflight
        run: |
          avail=$(df --output=avail -B1 . | tail -1)
          if [ "$avail" -lt 25000000000 ]; then
            echo "::error::Insufficient disk: need ≥25GB, have $((avail/1024/1024/1024))GB"
            exit 1
          fi

      - name: Link persistent cache
        run: |
          if [ -z "${LEGALIZE_CACHE_DIR:-}" ]; then
            echo "::error::LEGALIZE_CACHE_DIR is not configured"
            exit 1
          fi
          mkdir -p "$WORKSPACE_ROOT"
          mkdir -p "$LEGALIZE_CACHE_DIR"
          rm -rf "$WORKSPACE_ROOT/.cache"
          ln -s "$LEGALIZE_CACHE_DIR" "$WORKSPACE_ROOT/.cache"

      - name: Fetch laws cache
        id: fetch_laws
        continue-on-error: true
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          LAW_API_REQUEST_DELAY_SECONDS: '0.2'
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          # --refresh-history: lsHistory 캐시를 우회하고 재조회해
          # 타법개정 등 lawSearch.do가 반환하지 않는 MST까지 포괄 수집
          # (issue #31 재발 방지). 추가 API 호출은 법령명 수만큼이며,
          # 기본 240분 타임아웃 내에 여유롭게 끝남.
          python -m laws.fetch_cache --refresh-history --history-name-file laws/data/history_seed_names.txt --workers 5

      - name: Fetch precedents cache
        id: fetch_precedents
        continue-on-error: true
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          python -m precedents.fetch_cache

      - name: Fetch administrative rules history cache
        id: fetch_admrules
        continue-on-error: true
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          python -m admrules.fetch_cache

      - name: Fetch ordinances cache
        id: fetch_ordinances
        continue-on-error: true
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          # Preserve legacy ID-key files, seed current serials under history/,
          # and resume at most 50k missing historical details per daily run.
          python -m ordinances.fetch_cache --history --display 500 --max-new-details "$ORDINANCE_MAX_NEW_DETAILS"

      - name: Cache size summary
        working-directory: ${{ env.PIPELINE_REPO }}
        run: du -sh "$LEGALIZE_CACHE_DIR"/* | tee -a "$GITHUB_STEP_SUMMARY"

      - name: File-count regression gate
        working-directory: ${{ env.PIPELINE_REPO }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          python -m cache.baseline --cache-dir "$LEGALIZE_CACHE_DIR" --output cache-baseline.json

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v7
        with:
          name: cache-baseline
          path: ${{ env.PIPELINE_REPO }}/cache-baseline.json
          retention-days: 90

      - name: Report cache fetch failures
        if: always()
        run: |
          failed=0
          if [ "${{ steps.fetch_laws.outcome }}" != "success" ]; then
            echo "::error::Laws cache fetch failed"
            failed=1
          fi
          if [ "${{ steps.fetch_precedents.outcome }}" != "success" ]; then
            echo "::error::Precedents cache fetch failed"
            failed=1
          fi
          if [ "${{ steps.fetch_admrules.outcome }}" != "success" ]; then
            echo "::error::Administrative rules cache fetch failed"
            failed=1
          fi
          if [ "${{ steps.fetch_ordinances.outcome }}" != "success" ]; then
            echo "::error::Ordinances cache fetch failed"
            failed=1
          fi
          exit "$failed"
