name: Daily Cache Refresh

on:
  schedule:
    - cron: '0 14 * * *' # 23:00 KST (UTC+9)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workspace-cache
  cancel-in-progress: false

env:
  WORKSPACE_ROOT: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT
  LEGALIZE_CACHE_DIR: ${{ secrets.LEGALIZE_CACHE_DIR }}
  LEGALIZE_KR_REPO: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT/legalize-kr
  PIPELINE_REPO: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT/legalize-pipeline

jobs:
  refresh:
    runs-on: self-hosted
    timeout-minutes: 240

    steps:
      - name: Checkout law repo
        uses: actions/checkout@v6
        with:
          repository: legalize-kr/legalize-kr
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          path: LEGALIZE-KR-WORKSPACE-ROOT/legalize-kr

      - name: Checkout pipeline
        uses: actions/checkout@v6
        with:
          path: LEGALIZE-KR-WORKSPACE-ROOT/legalize-pipeline

      - name: Setup Python venv
        run: |
          python3 -m venv "$WORKSPACE_ROOT/.venv"
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          pip install -r "$PIPELINE_REPO/requirements.txt"

      - name: Disk preflight
        run: |
          avail=$(df --output=avail -B1 . | tail -1)
          if [ "$avail" -lt 25000000000 ]; then
            echo "::error::Insufficient disk: need ≥25GB, have $((avail/1024/1024/1024))GB"
            exit 1
          fi

      - name: Link persistent cache
        run: |
          if [ -z "${LEGALIZE_CACHE_DIR:-}" ]; then
            echo "::error::LEGALIZE_CACHE_DIR is not configured"
            exit 1
          fi
          mkdir -p "$WORKSPACE_ROOT"
          mkdir -p "$LEGALIZE_CACHE_DIR"
          rm -rf "$WORKSPACE_ROOT/.cache"
          ln -s "$LEGALIZE_CACHE_DIR" "$WORKSPACE_ROOT/.cache"

      - name: Fetch laws cache
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          # --refresh-history: lsHistory 캐시를 우회하고 재조회해
          # 타법개정 등 lawSearch.do가 반환하지 않는 MST까지 포괄 수집
          # (issue #31 재발 방지). 추가 API 호출은 법령명 수만큼이며,
          # 기본 240분 타임아웃 내에 여유롭게 끝남.
          python -m laws.fetch_cache --refresh-history

      - name: Fetch precedents cache
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          python -m precedents.fetch_cache

      - name: Fetch administrative rules cache
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          python -m admrules.fetch_cache

      - name: Fetch ordinances cache
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          LAW_API_DAILY_BUDGET: 300000
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          python -m ordinances.fetch_cache

      - name: Cache size summary
        working-directory: ${{ env.PIPELINE_REPO }}
        run: du -sh "$LEGALIZE_CACHE_DIR"/* | tee -a "$GITHUB_STEP_SUMMARY"

      - name: File-count regression gate
        run: |
          baseline_file="$LEGALIZE_CACHE_DIR/.cache-baseline.json"
          # Note: legitimate count drops can come from law repeals (detail/), _no_result_ids.txt pruning (precedent/), or upstream cache invalidation. 1% tolerance band absorbs these.
          pass=true
          for subdir in detail history precedent images admrule ordinance; do
            new=$(find "$LEGALIZE_CACHE_DIR/$subdir" -type f 2>/dev/null | wc -l | tr -d ' ')
            echo "Cache $subdir: $new files"
            if [ -f "$baseline_file" ]; then
              baseline=$(BASELINE_FILE="$baseline_file" SUBDIR="$subdir" python3 -c 'import json, os; d=json.load(open(os.environ["BASELINE_FILE"])); print(d.get(os.environ["SUBDIR"], 0))')
              threshold=$(BASELINE="$baseline" python3 -c 'import os; print(int(int(os.environ["BASELINE"]) * 0.99))')
              if [ "$new" -lt "$threshold" ]; then
                echo "::error::Cache regression in $subdir: $new < threshold $threshold (baseline $baseline)"
                pass=false
              elif [ "$new" -lt "$baseline" ]; then
                echo "::warning::Cache count dropped in $subdir: $new < baseline $baseline (within 1% tolerance)"
              fi
            fi
          done
          python3 - <<'PYTHON_EOF'
          import json, os, subprocess, pathlib
          counts = {}
          for subdir in ["detail", "history", "precedent", "images", "admrule", "ordinance"]:
              result = subprocess.run(
                  ["find", f"{os.environ['LEGALIZE_CACHE_DIR']}/{subdir}", "-type", "f"],
                  capture_output=True, text=True
              )
              counts[subdir] = len([l for l in result.stdout.splitlines() if l])
          payload = json.dumps(counts, indent=2)
          pathlib.Path("cache-baseline.json").write_text(payload)
          (pathlib.Path(os.environ["LEGALIZE_CACHE_DIR"]) / ".cache-baseline.json").write_text(payload)
          print("Wrote cache-baseline.json:", counts)
          PYTHON_EOF
          $pass || exit 1

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v7
        with:
          name: cache-baseline
          path: cache-baseline.json
          retention-days: 90
