name: Daily Ordinances Update

on:
  schedule:
    - cron: '0 13 * * *' # 22:00 KST (UTC+9)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit import count for probe runs'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: workspace-cache
  cancel-in-progress: false

env:
  WORKSPACE_ROOT: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT
  LEGALIZE_CACHE_DIR: ${{ secrets.LEGALIZE_CACHE_DIR }}
  ORDINANCE_KR_REPO: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT/ordinance-kr
  PIPELINE_REPO: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT/legalize-pipeline

jobs:
  update:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout ordinances repo
        uses: actions/checkout@v4
        with:
          repository: legalize-kr/ordinance-kr
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          path: LEGALIZE-KR-WORKSPACE-ROOT/ordinance-kr

      - name: Checkout pipeline
        uses: actions/checkout@v4
        with:
          path: LEGALIZE-KR-WORKSPACE-ROOT/legalize-pipeline

      - name: Link persistent cache
        run: |
          if [ -z "${LEGALIZE_CACHE_DIR:-}" ]; then
            echo "::error::LEGALIZE_CACHE_DIR is not configured"
            exit 1
          fi
          mkdir -p "$WORKSPACE_ROOT"
          mkdir -p "$LEGALIZE_CACHE_DIR"
          rm -rf "$WORKSPACE_ROOT/.cache"
          ln -s "$LEGALIZE_CACHE_DIR" "$WORKSPACE_ROOT/.cache"

      - name: Setup Python venv
        run: |
          python3 -m venv "$WORKSPACE_ROOT/.venv"
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          pip install -r "$PIPELINE_REPO/requirements.txt"

      - name: Configure git
        working-directory: ${{ env.ORDINANCE_KR_REPO }}
        run: |
          git config user.name "legalize-kr-bot"
          git config user.email "bot@legalize.kr"

      - name: Run ordinances update
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          LIMIT: ${{ inputs.limit }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          if [ -n "$LIMIT" ]; then
            python -m ordinances.update --repo "$ORDINANCE_KR_REPO" --limit "$LIMIT" --days 10 --commit
          else
            python -m ordinances.update --repo "$ORDINANCE_KR_REPO" --days 10 --commit
          fi

      - name: Validate
        working-directory: ${{ env.PIPELINE_REPO }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          python -m ordinances.validate "$ORDINANCE_KR_REPO"

      - name: Push changes
        working-directory: ${{ env.ORDINANCE_KR_REPO }}
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline)" ]; then
            git push
          else
            echo "No new commits to push"
          fi
