name: Daily Laws Update

on:
  schedule:
    - cron: '0 13 * * *' # 22:00 KST (UTC+9)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: workspace-cache
  cancel-in-progress: false

jobs:
  update:
    runs-on: self-hosted
    timeout-minutes: 60

    steps:
      - name: Checkout law repo
        uses: actions/checkout@v4
        with:
          repository: legalize-kr/legalize-kr
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          path: workspace

      - name: Clean previous pipeline checkout
        run: rm -rf workspace/pipeline

      - name: Checkout pipeline
        uses: actions/checkout@v4
        with:
          path: workspace/pipeline

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: legalize-kr/legalize-web
          token: ${{ secrets.REPO_PAT }}
          path: docs-repo

      - name: Link persistent cache
        run: |
          mkdir -p /opt/data/legalize-cache
          ln -sfn /opt/data/legalize-cache workspace/.cache

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r workspace/pipeline/requirements.txt

      - name: Configure git
        working-directory: workspace
        run: |
          git config user.name "legalize-kr-bot"
          git config user.email "bot@legalize.kr"

      - name: Run update
        working-directory: workspace/pipeline
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
        run: |
          . ../../.venv/bin/activate
          python -m laws.update

      - name: Validate
        working-directory: workspace/pipeline
        run: |
          . ../../.venv/bin/activate
          python -m laws.validate

      - name: Report import failures
        working-directory: workspace
        run: |
          . ../.venv/bin/activate
          PYTHONPATH="$(pwd)/pipeline" python -m laws._ci.delta_gate

      - name: Push law changes
        working-directory: workspace
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline)" ]; then
            git push
          else
            echo "No new commits to push"
          fi

      - name: Update docs stats
        run: |
          if [ -f workspace/stats.json ]; then
            cd docs-repo
            git fetch origin main
            git reset --hard origin/main
            cp ../workspace/stats.json stats.json
            git add stats.json
            git diff --staged --quiet && echo "No docs changes" && exit 0
            git config user.name "legalize-kr-bot"
            git config user.email "bot@legalize.kr"
            git commit --author="legalize-kr-bot <bot@legalize.kr>" -m "chore: update stats.json"
            git push origin main
          fi
