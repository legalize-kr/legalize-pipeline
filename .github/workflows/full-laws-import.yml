name: Full Laws Import

on:
  workflow_dispatch:
    inputs:
      law_type:
        description: '법령구분 필터 (e.g. 법률, 대통령령)'
        required: false
        default: ''
      limit:
        description: '최대 import 건수'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: laws-update
  cancel-in-progress: false

env:
  WORKSPACE_ROOT: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT
  LEGALIZE_CACHE_DIR: ${{ secrets.LEGALIZE_CACHE_DIR }}
  LEGALIZE_KR_REPO: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT/legalize-kr
  LEGALIZE_WEB_REPO: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT/legalize-web
  PIPELINE_REPO: ${{ github.workspace }}/LEGALIZE-KR-WORKSPACE-ROOT/legalize-pipeline

jobs:
  import:
    runs-on: self-hosted
    timeout-minutes: 360

    steps:
      - name: Checkout law repo
        uses: actions/checkout@v6
        with:
          repository: legalize-kr/legalize-kr
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          path: LEGALIZE-KR-WORKSPACE-ROOT/legalize-kr

      - name: Checkout pipeline
        uses: actions/checkout@v6
        with:
          path: LEGALIZE-KR-WORKSPACE-ROOT/legalize-pipeline

      - name: Checkout docs repo
        uses: actions/checkout@v6
        with:
          repository: legalize-kr/legalize-web
          token: ${{ secrets.REPO_PAT }}
          path: LEGALIZE-KR-WORKSPACE-ROOT/legalize-web

      - name: Link persistent cache
        run: |
          if [ -z "${LEGALIZE_CACHE_DIR:-}" ]; then
            echo "::error::LEGALIZE_CACHE_DIR is not configured"
            exit 1
          fi
          mkdir -p "$WORKSPACE_ROOT"
          mkdir -p "$LEGALIZE_CACHE_DIR"
          rm -rf "$WORKSPACE_ROOT/.cache"
          ln -s "$LEGALIZE_CACHE_DIR" "$WORKSPACE_ROOT/.cache"

      - name: Setup Python venv
        run: |
          python3 -m venv "$WORKSPACE_ROOT/.venv"
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          pip install -r "$PIPELINE_REPO/requirements.txt"

      - name: Configure git
        working-directory: ${{ env.LEGALIZE_KR_REPO }}
        run: |
          git config user.name "legalize-kr-bot"
          git config user.email "bot@legalize.kr"

      - name: Build cache if missing
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          if [ ! -d "$WORKSPACE_ROOT/.cache/detail" ] || [ -z "$(ls -A "$WORKSPACE_ROOT/.cache/detail/" 2>/dev/null)" ]; then
            echo "Cache missing or empty, building..."
            if ! python -m laws.fetch_cache 2>&1 | tee /tmp/fetch_cache.log; then
              echo "::error::fetch_cache failed. If this is an invariant breach, inspect allowlist at laws/known_empty_history.yaml."
              grep -A 10 "History cache invariant violated" /tmp/fetch_cache.log || true
              grep -A 3  "Allowlist pre-flight failed"      /tmp/fetch_cache.log || true
              exit 1
            fi
          else
            echo "Cache exists ($(ls "$WORKSPACE_ROOT"/.cache/detail/*.xml 2>/dev/null | wc -l) detail files)"
          fi

      - name: Try download compiler
        id: compiler
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          arch=$(uname -m)
          case "$arch" in
            aarch64|arm64) pattern='linux.*(aarch64|arm64)|(aarch64|arm64).*linux' ;;
            x86_64|amd64) pattern='linux.*(x86_64|amd64)|(x86_64|amd64).*linux' ;;
            *) echo "::warning::Unsupported compiler arch: $arch"; echo "available=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac
          ASSET_URL=$(gh api repos/legalize-kr/compiler/releases/latest \
            --jq ".assets[] | select(.name | test(\"$pattern\")) | .browser_download_url" 2>/dev/null | head -1)
          if [ -n "$ASSET_URL" ]; then
            echo "Downloading compiler from $ASSET_URL"
            curl -sL "$ASSET_URL" -o /tmp/legalize-compiler
            chmod +x /tmp/legalize-compiler
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "No compiler release found, will use rebuild.py"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild repository
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          LAW_TYPE: ${{ inputs.law_type }}
          LIMIT: ${{ inputs.limit }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          if [ "${{ steps.compiler.outputs.available }}" = "true" ]; then
            echo "Running compiler..."
            # 컴파일러는 bare repo를 새로 만든다 (<cache_dir> -o <output.git>).
            # 매 실행마다 깨끗한 출력을 위해 먼저 제거한다.
            rm -rf /tmp/rebuilt.git
            /tmp/legalize-compiler "$WORKSPACE_ROOT/.cache" -o /tmp/rebuilt.git
            # 재구성된 bare repo의 main을 workspace 체크아웃에 반영해
            # 이후 "Force push" 단계가 재구성 히스토리를 origin에 올리도록 한다.
            # (컴파일러 출력은 bare이므로 working tree에 직접 쓸 수 없고,
            #  workspace는 non-bare이므로 fetch + reset --hard 로 통합)
            echo "Integrating rebuilt bare repo into workspace..."
            ( cd "$LEGALIZE_KR_REPO" && git fetch /tmp/rebuilt.git main && git reset --hard FETCH_HEAD )
          else
            echo "Running rebuild..."
            python -m laws.rebuild --branch rebuild
          fi

      - name: Validate
        working-directory: ${{ env.PIPELINE_REPO }}
        run: |
          . "$WORKSPACE_ROOT/.venv/bin/activate"
          python -m laws.validate

      - name: Force push rebuilt history
        working-directory: ${{ env.LEGALIZE_KR_REPO }}
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$BRANCH" = "rebuild" ]; then
            git branch -M rebuild main
          fi
          git push --force origin main

      - name: Update docs stats
        run: |
          if [ -f "$LEGALIZE_KR_REPO/stats.json" ]; then
            cd "$LEGALIZE_WEB_REPO"
            git fetch origin main
            git reset --hard origin/main
            cp "$LEGALIZE_KR_REPO/stats.json" stats.json
            git add stats.json
            git diff --staged --quiet && echo "No docs changes" && exit 0
            git config user.name "legalize-kr-bot"
            git config user.email "bot@legalize.kr"
            git commit --author="legalize-kr-bot <bot@legalize.kr>" -m "chore: update stats.json"
            git push origin main
          fi
