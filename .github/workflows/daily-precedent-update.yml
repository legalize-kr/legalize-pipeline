name: Daily Precedents Update

on:
  schedule:
    - cron: '0 11 * * *' # 20:00 KST (UTC+9)
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback days'
        required: false
        default: '180'

permissions:
  contents: write

concurrency:
  group: workspace-cache
  cancel-in-progress: false

jobs:
  update:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout precedent repo
        uses: actions/checkout@v4
        with:
          repository: legalize-kr/precedent-kr
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          path: workspace

      - name: Clean previous pipeline checkout
        run: rm -rf workspace/pipeline

      - name: Checkout pipeline
        uses: actions/checkout@v4
        with:
          path: workspace/pipeline

      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          repository: legalize-kr/legalize-web
          token: ${{ secrets.REPO_PAT }}
          path: docs-repo

      - name: Link persistent cache
        run: |
          mkdir -p /opt/data/legalize-cache
          ln -sfn /opt/data/legalize-cache workspace/.cache

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r workspace/pipeline/requirements.txt

      - name: Configure git
        working-directory: workspace
        run: |
          git config user.name "legalize-kr-bot"
          git config user.email "bot@legalize.kr"

      - name: Run precedent update
        working-directory: workspace/pipeline
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          WORKSPACE_ROOT: ${{ github.workspace }}/workspace
        run: |
          . ../../.venv/bin/activate
          python -m precedents.update --days ${{ inputs.days || '180' }}

      - name: Validate filename byte-length invariant (NAME_MAX)
        working-directory: workspace
        run: |
          over=$(LC_ALL=C find . -path ./.git -prune -o -type f -print \
                 | awk -F/ '{ if (length($NF) > 255) print $0 }')
          if [ -n "$over" ]; then
            echo "::error::Filename(s) exceed 255 bytes (NAME_MAX):"
            echo "$over"
            exit 1
          fi

      - name: Remove stale metadata.json and stats.json from precedent repo
        working-directory: workspace
        run: |
          changed=0
          for f in metadata.json stats.json; do
            if git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
              git rm -f "$f"
              changed=1
            fi
            if ! grep -qxF "$f" .gitignore 2>/dev/null; then
              echo "$f" >> .gitignore
              changed=1
            fi
          done
          if [ "$changed" = "1" ]; then
            git add .gitignore
            git commit --author="legalize-kr-bot <bot@legalize.kr>" \
              -m "chore: stop tracking metadata.json and stats.json"
          else
            echo "metadata.json/stats.json already absent and gitignored"
          fi

      - name: Push changes
        working-directory: workspace
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline)" ]; then
            git push
          else
            echo "No new commits to push"
          fi

      - name: Regenerate precedent-stats.json in docs repo
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}/workspace
        run: |
          cd docs-repo
          git fetch origin main
          git reset --hard origin/main
          python3 - <<'PYTHON_EOF'
          import json
          import os
          from collections import Counter
          from datetime import datetime, timezone
          from pathlib import Path

          root = Path(os.environ["WORKSPACE_ROOT"])
          files = [
              p for p in root.rglob("*.md")
              if ".git" not in p.parts
              and len(p.relative_to(root).parts) == 3
          ]
          case_types: Counter = Counter()
          courts: Counter = Counter()
          for p in files:
              case_type, court_tier, _ = p.relative_to(root).parts
              case_types[case_type] += 1
              courts[court_tier] += 1

          stats = {
              "total": len(files),
              "courts": dict(sorted(courts.items())),
              "case_types": dict(sorted(case_types.items())),
              "skipped_errors": 0,
              "generated_at": datetime.now(timezone.utc).isoformat(),
          }
          Path("precedent-stats.json").write_text(
              json.dumps(stats, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PYTHON_EOF
          git add precedent-stats.json
          if git diff --staged --quiet; then
            echo "No docs changes"
            exit 0
          fi
          git config user.name "legalize-kr-bot"
          git config user.email "bot@legalize.kr"
          git commit --author="legalize-kr-bot <bot@legalize.kr>" -m "chore: update precedent-stats.json"
          git push origin main
