name: Daily Precedent Update

on:
  schedule:
    - cron: '0 6 * * *' # 15:00 KST (UTC+9)
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback days'
        required: false
        default: '30'

permissions:
  contents: write

concurrency:
  group: precedent-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout precedent repo
        uses: actions/checkout@v4
        with:
          repository: legalize-kr/precedent-kr
          token: ${{ secrets.REPO_PAT }}
          fetch-depth: 0
          path: workspace

      - name: Clean previous pipeline checkout
        run: rm -rf workspace/pipeline

      - name: Checkout pipeline
        uses: actions/checkout@v4
        with:
          path: workspace/pipeline

      - name: Setup Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r workspace/pipeline/requirements.txt

      - name: Configure git
        working-directory: workspace
        run: |
          git config user.name "legalize-kr-bot"
          git config user.email "bot@legalize.kr"

      - name: Run precedent update
        working-directory: workspace/pipeline
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          WORKSPACE_ROOT: ${{ github.workspace }}/workspace
        run: |
          . ../../.venv/bin/activate
          python -m precedents.update --days ${{ inputs.days || '30' }}

      - name: Regenerate metadata
        working-directory: workspace/pipeline
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}/workspace
        run: |
          . ../../.venv/bin/activate
          python -m precedents.generate_metadata

      - name: Commit metadata
        working-directory: workspace
        run: |
          git add metadata.json stats.json
          git diff --cached --quiet && echo "No metadata changes" && exit 0
          git commit --author="legalize-kr-bot <bot@legalize.kr>" -m "chore: update metadata.json + stats.json"

      - name: Push changes
        working-directory: workspace
        run: |
          if [ -n "$(git log origin/main..HEAD --oneline)" ]; then
            git push
          else
            echo "No new commits to push"
          fi
