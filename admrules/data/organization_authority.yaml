# - Government Organization Management Information System, historical org chart
#   https://org.go.kr/oam/gvrnOrgChartView.ifrm?flag=gov
# - JSON endpoint used by that page:
#   POST https://org.go.kr/oam/selectGvrnOrgViewList.do
#   body: {"pageName":"대국민서비스 기구도 조회","efYd":"20260102"}
