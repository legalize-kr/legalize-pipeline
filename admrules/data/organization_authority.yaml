# The endpoint returns orgCode, orgNm, upOrgCode, rootOrgCode, efYd, edYd,
# reorganCode, and relgoagCode. These rows are used as the basis for current
# successor names and parent chains. Some non-current aliases below are retained
# because law.go.kr admrul history records old agency names in live revisions.

